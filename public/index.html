<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered solution built by Ujjwal Ayush for PromptWars Hackathon 2026">
    <title>PromptWars AI Solution | Ujjwal Ayush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-glow"></div>
            <div class="header-badge">⚡ PromptWars 2026</div>
            <h1 class="header-title">
                <span class="gradient-text">🤖 PromptWars AI</span>
            </h1>
            <p class="header-subtitle">Powered by Google Gemini 2.5 Pro · Built by Ujjwal Ayush</p>
        </header>

        <!-- Main App -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section glass-card" id="input-section">
                <div class="section-header">
                    <span class="section-icon">📝</span>
                    <h2>Enter Your Input</h2>
                </div>
                <textarea 
                    id="user-input" 
                    class="input-textarea" 
                    placeholder="Type or paste your text here..."
                    rows="6"
                ></textarea>
                
                <!-- Settings Row -->
                <div class="settings-row">
                    <div class="setting-item">
                        <label for="temperature-slider">🎨 Creativity</label>
                        <div class="slider-container">
                            <input type="range" id="temperature-slider" min="0" max="100" value="70" class="slider">
                            <span id="temp-value" class="slider-value">0.7</span>
                        </div>
                    </div>
                </div>

                <button id="generate-btn" class="generate-btn" onclick="generateResponse()">
                    <span class="btn-text">🚀 Generate Response</span>
                    <span class="btn-loader" style="display:none;">
                        <span class="spinner"></span> AI is thinking...
                    </span>
                </button>
            </section>

            <!-- Output Section -->
            <section class="output-section glass-card" id="output-section" style="display:none;">
                <div class="section-header">
                    <span class="section-icon">🎯</span>
                    <h2>Result</h2>
                    <button class="copy-btn" id="copy-btn" onclick="copyResult()" title="Copy to clipboard">
                        📋 Copy
                    </button>
                </div>
                <div id="result-content" class="result-content"></div>
            </section>

            <!-- Error Section -->
            <div id="error-message" class="error-message" style="display:none;">
                <span>❌</span> <span id="error-text"></span>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Built with ❤️ by <strong>Ujjwal Ayush</strong> for PromptWars Hackathon 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
